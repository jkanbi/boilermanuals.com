<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <title>Boiler Manuals - Fault Codes</title>
    <link rel="stylesheet" type="text/css" href="css/navbar.css?v=5">
    <link rel="stylesheet" type="text/css" href="css/styles.css?v=6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="js/navbar.js?v=6"></script>
</head>
<body>
<div class="home-hero">
        <section class="home-search" aria-label="Boiler fault codes">
            <label class="visually-hidden" for="faultCodeSearch">Boiler fault codes</label>
            <input
                type="search"
                id="faultCodeSearch"
                class="home-search__input"
                placeholder="Brand + code or code only (e.g. Worcester EA, Vaillant F.28 / F28, E133 etc.)"
                autocomplete="off"
                spellcheck="false"
            >
            <div id="faultCodeResults" class="home-search-results" hidden></div>
        </section>
    </div>

    <div id="faultDetailPanel" class="fault-detail" hidden></div>

    <footer class="site-footer">
        <p>
            Fault code meanings are for guidance only. Always use a Gas Safe registered engineer for repairs.
            Data sourced in part from <a href="https://hub.myboiler.com/fault-codes/" rel="noopener noreferrer">hub.myboiler.com</a>.
        </p>
    </footer>

    <script src="js/script.js?v=5"></script>
    <script src="js/fault-codes.js?v=2"></script>
</body>
</html>
